<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>Temperature Converter</h1>

    <div class="field">
      <label for="celsius">Celsius (°C)</label>
      <input type="number" id="celsius" placeholder="Enter °C">
    </div>

    <div class="field">
      <label for="fahrenheit">Fahrenheit (°F)</label>
      <input type="number" id="fahrenheit" placeholder="Enter °F">
    </div>

    <div class="field">
      <label for="kelvin">Kelvin (K)</label>
      <input type="number" id="kelvin" placeholder="Enter K">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
